<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>NBU · Региональная панель</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data-adapter.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="panel-v1.jsx"></script>
<script type="text/babel" src="panel-v2.jsx"></script>
<script type="text/babel" src="panel-v3.jsx"></script>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "region": "fergana",
  "period": "2025"
}/*EDITMODE-END*/;

const REGION_OPTIONS = [
  { value: 'fergana',       label: 'Фергана (полные данные)' },
  { value: 'samarqand',     label: 'Самарканд' },
  { value: 'tashkent_city', label: 'Ташкент (город) — внеш. торговля' },
  { value: 'bukhara',       label: 'Бухара' },
  { value: 'namangan',      label: 'Наманган (Q1 2026)' },
];

const ARTBOARD_BG = '#F4F5F9'; // M3 surface-container-low

function App() {
  const D = window.RegionData;
  const [tweaks, setTweak] = window.useTweaks
    ? window.useTweaks(TWEAK_DEFAULTS)
    : [TWEAK_DEFAULTS, () => {}];

  const regionData = D.REGIONS[tweaks.region];
  const region = { ...regionData, shortRu: regionData.shortRu };

  return (
    <>
      <DesignCanvas title="NBU · Региональная панель — варианты">
        <DCSection id="refined" title="01 / Refined card grid">
          <DCArtboard id="v1" label="Tile grid · NBU/M3 tokens" width={1180} height={620}>
            <div style={{ padding: 24, background: ARTBOARD_BG, height: '100%', boxSizing: 'border-box' }}>
              <PanelV1 region={region} period={tweaks.period}/>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="hierarchy" title="02 / Hero + grouped + comparison">
          <DCArtboard id="v2" label="Hero KPIs · grouped table · national rail" width={1280} height={820}>
            <div style={{ padding: 24, background: ARTBOARD_BG, height: '100%', boxSizing: 'border-box' }}>
              <PanelV2 region={region} period={tweaks.period}/>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="dashboard" title="03 / Editorial dashboard">
          <DCArtboard id="v3" label="Masthead · hero · deviation chart · rankings" width={1280} height={1100}>
            <div style={{ padding: 24, background: ARTBOARD_BG, height: '100%', boxSizing: 'border-box' }}>
              <PanelV3 region={region} period={tweaks.period}/>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {window.TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection title="Контекст данных">
            <TweakSelect
              label="Регион"
              value={tweaks.region}
              options={REGION_OPTIONS}
              onChange={v => setTweak('region', v)}
            />
            <TweakRadio
              label="Период"
              value={tweaks.period}
              options={[
                { value: '2025',   label: '2025' },
                { value: '2026Q1', label: 'Q1 26' },
              ]}
              onChange={v => setTweak('period', v)}
            />
          </TweakSection>
        </TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
